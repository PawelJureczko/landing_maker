services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: witrynovo
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
  mailpit:
    image: axllent/mailpit
    ports:
      - '1025:1025'
      - '8025:8025'
volumes:
  mysql_data:
